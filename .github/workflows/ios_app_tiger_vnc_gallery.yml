name: Gallery iOS App Tiger VNC

on: workflow_dispatch

jobs:
  run-simulator:
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install and Start User-Level VNC (TigerVNC)
        run: |
          brew install tiger-vnc

          mkdir -p ~/.vnc
          echo "pass123" | /opt/homebrew/bin/vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd

          /opt/homebrew/bin/vncserver :1 -geometry 1280x800 -depth 24 -rfbauth ~/.vnc/passwd &
          
          sleep 5
      - name: Boot Simulator
        run: |
          UDID=$(xcrun simctl list devices available | grep "iPhone" | head -1 | awk -F '[()]' '{print $2}')
          echo "Booting device: $UDID"
          xcrun simctl boot $UDID
          open -a Simulator

      - name: Download Artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
    
          workflow: ios_build_gallery.yml
    
          name: CanvasEggGalleryApp
    
          path: ./
      - name: Install and Launch App

        run: |
          APP_PATH="CanvasEggGalleryApp.xcarchive/Products/Applications/CanvasEggGalleryApp.app"
          BUNDLE_ID="io.github.honatsugiexpress.canvasegg.gallery"
          
          xcrun simctl install booted "$APP_PATH"
          xcrun simctl launch booted "$BUNDLE_ID"

      - name: Start ngrok TCP Tunnel
        run: |
          ngrok tcp 5900 --log=stdout > /dev/null &
          sleep 10
          
          TCP_URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url')
          echo "--------------------------------------------------"
          echo "VNC Address: $TCP_URL"
          echo "Username: runner"
          echo "Password: pass123"
          echo "--------------------------------------------------"

      - name: Keep Alive
        run: |
          echo "Waiting for 4 minutes before closing..."
          sleep 240
