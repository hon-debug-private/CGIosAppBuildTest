name: Gallery iOS Build

on: workflow_dispatch

jobs:
  build_framework:
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
            cache-read-only: false

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build KMP XCFramework
        run: |
          ./gradlew :canvasegg-examples:canvasegg-gallery:assembleCanvasEggGalleryKitDebugXCFramework
          
      - name: Upload XCFramework Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CanvasEggGalleryFramework
          path: canvasegg-examples/canvasegg-gallery/build/XCFrameworks/debug/CanvasEggGalleryKit.xcframework

  build_app:
    runs-on: macos-15
    needs: build_framework
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install XcodeGen
        run: |
          brew install xcodegen

      - name: Make Directory
        working-directory: canvasegg-examples/canvasegg-gallery-ios
        run: |
          mkdir -p Frameworks
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: CanvasEggGalleryFramework
          path: canvasegg-examples/canvasegg-gallery-ios/Frameworks
      - name: Generate Xcode Project
        working-directory: canvasegg-examples/canvasegg-gallery-ios
        run: |
          xcodegen generate
      - name: Run test
        working-directory: canvasegg-examples/canvasegg-gallery-ios
        run: |
          DEVICE_UUID=$(xcrun simctl list devices | grep "iPhone 16" | grep -v "unavailable" | grep -oE "([0-9A-F]{8}-([0-9A-F]{4}-){3}[0-9A-F]{12})" | head -n 1)
          xcrun simctl boot "$DEVICE_UUID"
          xcrun simctl io booted recordVideo output.mp4 &
          REC_PID=$!
          xcodebuild test \
            -scheme uiTest \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -only-testing:uiTest/AutoControlTest
          sleep 5
          kill -2 $REC_PID
          
          TIMEOUT=1000
          while ps -p $REC_PID > /dev/null && [ $TIMEOUT -gt 0 ]; do
            echo "Waiting for process $REC_PID to terminate... ($TIMEOUT)"
            sleep 1
            TIMEOUT=$((TIMEOUT - 1))
          done
          sleep 5
