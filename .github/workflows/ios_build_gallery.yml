name: Remote iOS Simulator with Manual Token

on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle
      
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build KMP XCFramework
        run: |
          ./gradlew :canvasegg-examples:canvasegg-gallery:assembleCanvasEggGalleryKitDebugXCFramework

      - name: Upload XCFramework Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CanvasEggGalleryKit
          path: canvasegg-examples/canvasegg-gallery/build/XCFrameworks/debug/
