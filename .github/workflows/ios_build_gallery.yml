name: Gallery iOS Build

on: workflow_dispatch

jobs:
  build_framework:
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
            cache-read-only: false

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build KMP XCFramework
        run: |
          ./gradlew :canvasegg-examples:canvasegg-gallery:assembleCanvasEggGalleryKitDebugXCFramework
          
      - name: Upload XCFramework Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CanvasEggGalleryFramework
          path: canvasegg-examples/canvasegg-gallery/build/XCFrameworks/debug/CanvasEggGalleryKit.xcframework
