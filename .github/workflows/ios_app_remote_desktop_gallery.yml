name: Gallery iOS App Chrome Remote desktop

on: workflow_dispatch
jobs:
  run-simulator:
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup noVNC Screen Share
        run: |
          brew install tigervnc cloudflare/cloudflare/cloudflared

          git clone https://github.com/novnc/noVNC.git noVNC
          git clone https://github.com/novnc/websockify noVNC/utils/websockify

          mkdir -p ~/.vnc
          echo "password123" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd

          vncserver :1 -geometry 1280x800 -depth 24 -rfbauth ~/.vnc/passwd

          ./noVNC/utils/novnc_proxy --vnc localhost:5901 --listen 6080 &
          cloudflared tunnel --url http://localhost:6080 > cloudflare.log 2>&1 &

          sleep 0.5
          echo "--- Access this URL ---"
          grep -o 'https://[-a-z0-9.]*\.trycloudflare\.com' cloudflare.log
          echo "--- Password: password123 ---"
      - name: Boot Simulator
        run: |
          UDID=$(xcrun simctl list devices available | grep "iPhone" | head -1 | awk -F '[()]' '{print $2}')
          echo "Booting device: $UDID"
          xcrun simctl boot $UDID
          open -a Simulator

      - name: Download Artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
    
          workflow: ios_build_gallery.yml
    
          name: CanvasEggGalleryApp
    
          path: ./
      - name: Install and Launch App

        run: |
          APP_PATH="CanvasEggGalleryApp.xcarchive/Products/Applications/CanvasEggGalleryApp.app"
          BUNDLE_ID="io.github.honatsugiexpress.canvasegg.gallery"
          
          xcrun simctl install booted "$APP_PATH"
          xcrun simctl launch booted "$BUNDLE_ID"

      - name: Keep Alive
        run: |
          echo "Waiting for 4 minutes before closing..."
          sleep 240
