name: Gallery iOS App Chrome Remote desktop

on: workflow_dispatch
jobs:
  run-simulator:
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup noVNC Screen Share
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -privs -all -restart -agent
          
          brew install cloudflare/cloudflare/cloudflared
          
          cloudflared tunnel --url tcp://localhost:5900 > cloudflare.log 2>&1 &
          
          sleep 10
          grep -o 'https://[-a-z0-9.]*\.trycloudflare\.com' cloudflare.log
      - name: Boot Simulator
        run: |
          UDID=$(xcrun simctl list devices available | grep "iPhone" | head -1 | awk -F '[()]' '{print $2}')
          echo "Booting device: $UDID"
          xcrun simctl boot $UDID
          open -a Simulator

      - name: Download Artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
    
          workflow: ios_build_gallery.yml
    
          name: CanvasEggGalleryApp
    
          path: ./
      - name: Install and Launch App

        run: |
          APP_PATH="CanvasEggGalleryApp.xcarchive/Products/Applications/CanvasEggGalleryApp.app"
          BUNDLE_ID="io.github.honatsugiexpress.canvasegg.gallery"
          
          xcrun simctl install booted "$APP_PATH"
          xcrun simctl launch booted "$BUNDLE_ID"

      - name: Keep Alive
        run: |
          echo "Waiting for 4 minutes before closing..."
          sleep 240
