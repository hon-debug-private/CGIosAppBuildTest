name: CanvasEggGalleryApp
targets:
  iosApp:
    type: application
    platform: iOS
    deploymentTarget: "18.1"
    sources:
      - path: Sources
    info:
      path: Info.plist
    dependencies:
      - framework: Frameworks/CanvasEggGalleryKit.xcframework
        embed: true
    scheme:
      testTargets:
        - uiTest

    settings:
      PRODUCT_NAME: CanvasEggGalleryApp
      PRODUCT_BUNDLE_IDENTIFIER: io.github.honatsugiexpress.canvasegg.gallery
      CODE_SIGNING_ALLOWED: NO
      CODE_SIGNING_REQUIRED: NO
      ENTITLEMENTS_REQUIRED: NO
      GENERATE_INFOPLIST_FILE: NO
  uiTest:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "18.1"
    sources:
      - path: Tests/UI
    info:
      path: Info.plist
    dependencies:
      - target: iosApp
    settings:
      PRODUCT_NAME: CanvasEggGalleryTest
      PRODUCT_BUNDLE_IDENTIFIER: io.github.honatsugiexpress.canvasegg.gallery.uitest
      PRODUCT_BUNDLE_PACKAGE_TYPE: BNDL
      CODE_SIGNING_ALLOWED: NO
      CODE_SIGNING_REQUIRED: NO
      ENTITLEMENTS_REQUIRED: NO